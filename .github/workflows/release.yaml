name: MajNet release

# Release tier (MajNet ADR 0009/0018/0020, adapted to per-app tag naming).
#
# Primary trigger — a PER-APP tag `@sideline/<app>@vX.Y.Z`: builds + pushes
# that ONE app's image ghcr.io/<owner>/<repo>/<app>:vX.Y.Z. Releasing the
# whole monorepo = pushing one such tag per app (usually all at the same
# version). The GHCR publish fires the registry_package webhook; the MajNet
# bot records the release (version → digest) for that app and auto-tracks it
# into the `stable` class. Production is a separate promote (dashboard),
# gated by the admin-reviewed env/production render PR in sideline-cz/ops.
#
# Fallback trigger — a plain repo-wide tag `vX.Y.Z` (what the MajNet
# dashboard's cut action produces): releases EVERY app at that version.
#
# `resolve` parses the tag into a matrix + version; `release` delegates the
# actual build/push to the reusable monorepo-aware app-release.yaml (ADR
# 0020), which passes `version` straight through as the image tag (rather
# than deriving it from the git ref name) and bakes it + the commit + build
# time into the image as build-args so the app can report them at /info.

on:
  push:
    tags:
      - '@sideline/**@v*'
      - 'v*'

jobs:
  resolve:
    name: Resolve apps + version
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - id: parse
        env:
          REF: ${{ github.ref_name }}
        run: |
          ALL='["proxy","server","web","docs","bot"]'
          if [[ "$REF" == @sideline/*@v* ]]; then
            APP="${REF#@sideline/}"; APP="${APP%@v*}"
            VERSION="v${REF##*@v}"
            if ! echo "$ALL" | jq -e --arg a "$APP" 'index($a)' > /dev/null; then
              echo "::error::'$APP' is not a deployable app (tag $REF)"; exit 1
            fi
            MATRIX=$(jq -nc --arg a "$APP" '[$a]')
          else
            VERSION="$REF"
            MATRIX="$ALL"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Release (${{ matrix.app }} ${{ needs.resolve.outputs.version }})
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.resolve.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    uses: majnet/majnet/.github/workflows/app-release.yaml@main
    with:
      leaf: ${{ matrix.app }}
      version: ${{ needs.resolve.outputs.version }}
      context: .
      dockerfile: applications/${{ matrix.app }}/Dockerfile
